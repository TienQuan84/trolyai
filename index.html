<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ Lý Thủ Tục Hành Chính AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: 60vh; overflow-y: auto; }
        .loading { display: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-2xl rounded-xl shadow-2xl flex flex-col overflow-hidden">
        <div class="bg-blue-600 p-4 text-white">
            <h1 class="text-xl font-bold">🤖 Trợ Lý Hành Chính Công</h1>
            <p class="text-sm opacity-80">Hỏi về làm CCCD, Hộ chiếu, Đăng ký kết hôn...</p>
        </div>

        <div id="chatBox" class="chat-container p-4 space-y-4 bg-gray-50">
            <div class="bg-blue-100 p-3 rounded-lg max-w-[80%] text-sm">
                Chào bạn! Tôi là trợ lý AI chuyên về thủ tục hành chính tại Việt Nam. Bạn cần giúp gì hôm nay?
            </div>
        </div>

        <div id="loader" class="loading px-4 py-2 text-xs text-gray-500 italic">Gemini đang suy nghĩ...</div>

        <div class="p-4 border-t border-gray-200 bg-white">
            <div class="flex gap-2">
                <input type="text" id="userInput" 
                    placeholder="Nhập câu hỏi của bạn (VD: Thủ tục làm hộ chiếu online?)" 
                    class="flex-1 p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="sendMessage()" 
                    class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        // THAY API KEY CỦA BẠN VÀO ĐÂY
        const API_KEY = "AIzaSyCOXL3Pnl_7rfwO1c2TUSN5oHf_Mz_frsg";
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chatBox = document.getElementById('chatBox');
            const loader = document.getElementById('loader');
            const message = input.value.trim();

            if (!message) return;

            // Hiển thị tin nhắn người dùng
            appendMessage(message, 'user');
            input.value = '';
            loader.style.display = 'block';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `Bạn là một chuyên gia về thủ tục hành chính tại Việt Nam. 
                                Hãy trả lời câu hỏi sau một cách ngắn gọn, chính xác, có liệt kê các bước: ${message}`
                            }]
                        }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                // Hiển thị tin nhắn AI
                appendMessage(aiResponse, 'ai');
            } catch (error) {
                appendMessage("Xin lỗi, có lỗi xảy ra khi kết nối với AI.", 'ai');
                console.error(error);
            } finally {
                loader.style.display = 'none';
            }
        }

        function appendMessage(text, sender) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' 
                ? "ml-auto bg-blue-600 text-white p-3 rounded-lg max-w-[80%] text-sm shadow-sm"
                : "bg-gray-200 text-gray-800 p-3 rounded-lg max-w-[80%] text-sm shadow-sm";
            
            // Xử lý xuống dòng từ Markdown đơn giản
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Gửi tin nhắn bằng phím Enter
        document.getElementById('userInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
