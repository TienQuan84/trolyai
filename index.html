<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Tra Cứu Thủ Tục Hành Chính</title>
    <style>
        :root {
            --gov-blue: #003366; /* Màu xanh hành chính */
            --gov-red: #da251d;  /* Màu đỏ cờ/điểm nhấn */
            --bg-color: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            line-height: 1.6; 
            margin: 0;
            padding: 20px; 
            background-color: var(--bg-color);
        }

        .container { 
            max-width: 900px; 
            margin: 0 auto; 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 5px solid var(--gov-red);
        }

        .header-area { text-align: center; margin-bottom: 30px; }
        .header-area h1 { color: var(--gov-blue); text-transform: uppercase; margin: 10px 0; font-size: 24px; }
        .header-area p { color: #666; font-style: italic; }

        .search-box {
            width: 100%;
            padding: 15px;
            margin-bottom: 25px;
            border: 2px solid #ddd;
            border-radius: 50px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .search-box:focus { border-color: var(--gov-blue); box-shadow: 0 0 8px rgba(0,51,102,0.2); }

        .item { 
            border: 1px solid #dee2e6;
            margin-bottom: 12px; 
            border-radius: 6px;
            transition: 0.2s;
        }

        .question-header { 
            padding: 15px 20px;
            background: #fff;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            color: var(--gov-blue);
        }

        .question-header:hover { background: #f8f9fa; }

        .answer-content { 
            padding: 0 20px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.3s ease;
            background: #fff;
        }

        .active .answer-content { 
            padding: 15px 20px;
            max-height: 1000px;
            border-top: 1px dashed #ccc;
        }

        .active .question-header { background: #eef2ff; }

        .btn-drive {
            display: inline-flex;
            align-items: center;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #2d8c3c;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 500;
        }

        .btn-drive:hover { background-color: #21632c; }

        .tag {
            font-size: 11px;
            background: var(--gov-blue);
            color: white;
            padding: 3px 10px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        footer { text-align: center; margin-top: 30px; color: #888; font-size: 13px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-area">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a1/Emblem_of_Vietnam.svg" alt="Quốc huy" width="80">
        <h1>Tra Cứu Thủ Tục Hành Chính Công</h1>
        <p>Hệ thống hướng dẫn và cung cấp biểu mẫu tự động 2026</p>
    </div>
    
    <input type="text" id="searchInput" class="search-box" placeholder="Nhập tên thủ tục hoặc từ khóa cần tìm..." onkeyup="filterData()">

    <div id="content"></div>

    <footer>
        &copy; 2026 Hệ thống hỗ trợ dịch vụ công trực tuyến
    </footer>
</div>

<script>
    // --- PHẦN DỮ LIỆU (Bạn thay đổi nội dung ở đây) ---
    const dataAnswers = [
        {
            question: "Thủ tục Đăng ký khai sinh lưu động",
            category: "Hộ tịch",
            answer: "Chuẩn bị: Tờ khai theo mẫu, Giấy chứng sinh hoặc văn bản xác nhận của người làm chứng. Nộp tại UBND xã/phường.",
            driveLink: "https://drive.google.com/your-link-here"
        },
        {
            question: "Cấp giấy xác nhận tình trạng hôn nhân",
            category: "Hộ tịch",
            answer: "Thời gian giải quyết: Trong ngày làm việc. Nếu cần xác minh thì không quá 03 ngày.",
            driveLink: "https://drive.google.com/your-link-here"
        },
        {
            question: "Đăng ký biến động quyền sử dụng đất",
            category: "Đất đai",
            answer: "Hồ sơ gồm: Đơn đăng ký biến động, Giấy chứng nhận quyền sử dụng đất (bản gốc), Hợp đồng chuyển nhượng/tặng cho.",
            driveLink: "https://drive.google.com/your-link-here"
        },
        {
            question: "Danh sách cử tri Thôn 1 - Bầu cử 2026",
            category: "Bầu cử",
            answer: "Danh sách niêm yết chính thức các cử tri đủ điều kiện tham gia bỏ phiếu tại khu vực Thôn 1.",
            driveLink: "https://drive.google.com/your-link-here"
        }
    ];

    // --- PHẦN XỬ LÝ HỆ THỐNG ---
    const contentDiv = document.getElementById('content');

    function renderData(items) {
        if (items.length === 0) {
            contentDiv.innerHTML = "<div style='text-align:center; padding:20px; color:red;'>Không tìm thấy kết quả phù hợp.</div>";
            return;
        }

        contentDiv.innerHTML = items.map((item, index) => `
            <div class="item" id="item-${index}">
                <div class="question-header" onclick="toggleItem(${index})">
                    <span>${item.question}</span>
                    <span class="tag">${item.category}</span>
                </div>
                <div class="answer-content">
                    <div style="color: #444; margin-bottom: 10px;"><strong>Hướng dẫn:</strong></div>
                    <p>${item.answer}</p>
                    ${item.driveLink ? `
                        <a href="${item.driveLink}" target="_blank" class="btn-drive">
                            <span>📄 Tải biểu mẫu/Xem tài liệu</span>
                        </a>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }

    function toggleItem(index) {
        const el = document.getElementById(`item-${index}`);
        const isActive = el.classList.contains('active');
        
        // Đóng các mục khác để tạo hiệu ứng chuyên nghiệp
        document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));
        
        if (!isActive) {
            el.classList.add('active');
        }
    }

    function filterData() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const filtered = dataAnswers.filter(item => 
            item.question.toLowerCase().includes(keyword) || 
            item.answer.toLowerCase().includes(keyword) ||
            item.category.toLowerCase().includes(keyword)
        );
        renderData(filtered);
    }

    // Chạy hiển thị lần đầu
    window.onload = () => renderData(dataAnswers);
</script>

</body>
</html>
