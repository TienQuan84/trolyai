<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trợ lý ảo TTDVTH - Xã Bắc Ruộng (AI Powered)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 450px; height: 650px; background: white; border-radius: 15px; box-shadow: 0 5px 25px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background: #0056b3; color: white; padding: 20px; text-align: center; font-weight: bold; font-size: 1.1em; }
        .chat-box { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; display: flex; flex-direction: column; }
        .message { margin-bottom: 15px; padding: 12px; border-radius: 15px; max-width: 85%; line-height: 1.5; font-size: 0.95em; position: relative; }
        .bot { background: #e1f5fe; align-self: flex-start; color: #333; border-bottom-left-radius: 2px; }
        .user { background: #0056b3; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .loading { font-style: italic; color: #888; font-size: 0.8em; margin-left: 5px; }
        .chat-input { display: flex; padding: 15px; border-top: 1px solid #ddd; background: white; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; padding-left: 20px; }
        button { background: #0056b3; color: white; border: none; padding: 10px 20px; margin-left: 8px; border-radius: 25px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #004494; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Trợ lý ảo Hành chính công - Xã Bắc Ruộng</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">Xin chào! Tôi là AI chuyên gia về thủ tục hành chính tại xã Bắc Ruộng. Bạn cần giúp đỡ gì về hồ sơ, giấy tờ hôm nay?</div>
    </div>
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Hỏi về khai sinh, đất đai, công chứng...">
        <button onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
    // 1. ĐIỀN API KEY CỦA BẠN VÀO ĐÂY
    const API_KEY = "NHẬP_MÃ_API_KEY_CỦA_BẠN_VÀO_ĐÂY"; 

    async function sendMessage() {
        const inputField = document.getElementById("userInput");
        const chatBox = document.getElementById("chatBox");
        const userText = inputField.value.trim();

        if (userText === "") return;

        // Hiển thị tin nhắn người dùng
        chatBox.innerHTML += `<div class="message user">${userText}</div>`;
        inputField.value = "";
        
        // Hiển thị trạng thái đang xử lý
        const loadingId = "loading-" + Date.now();
        chatBox.innerHTML += `<div class="loading" id="${loadingId}">Đang suy nghĩ...</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo", // Hoặc "gpt-4"
                    messages: [
                        {
                            role: "system", 
                            content: "Bạn là trợ lý ảo hành chính công của xã Bắc Ruộng. Hãy trả lời ngắn gọn, chính xác các thủ tục dựa trên pháp luật Việt Nam. Luôn nhắc người dân mang theo bản chính để đối chiếu."
                        },
                        { role: "user", content: userText }
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            if (data.choices && data.choices[0]) {
                const botReply = data.choices[0].message.content;
                chatBox.innerHTML += `<div class="message bot">${botReply.replace(/\n/g, '<br>')}</div>`;
            } else {
                chatBox.innerHTML += `<div class="message bot">Xin lỗi, có lỗi kết nối với AI. Vui lòng kiểm tra lại API Key.</div>`;
            }
        } catch (error) {
            document.getElementById(loadingId).remove();
            chatBox.innerHTML += `<div class="message bot">Lỗi hệ thống: Không thể kết nối server.</div>`;
            console.error("Lỗi:", error);
        }

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Cho phép nhấn Enter để gửi
    document.getElementById("userInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
